apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-namespace-baseline-role
spec:
  background: true
  rules:
    - name: create-namespace-baseline-role
      match:
        resources:
          kinds:
            - Namespace
      exclude:
        resources:
          names:
            - kube-system
            - kube-public
            - gatekeeper-system
            - kyverno
      generate:
        kind: Role
        name: namespace-baseline
        synchronize: true
        data:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: namespace-baseline
            namespace: "{{request.object.metadata.name}}"
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
                - services
                - endpoints
                - configmaps
              verbs:
                - get
                - list
                - watch
