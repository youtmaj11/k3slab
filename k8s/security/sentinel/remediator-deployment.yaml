apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyverno-remediator
  namespace: kyverno-sentinel
  labels:
    app: kyverno-remediator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyverno-remediator
  template:
    metadata:
      labels:
        app: kyverno-remediator
    spec:
      serviceAccountName: kyverno-sentinel
      containers:
        - name: remediator
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              python -m pip install --no-cache-dir kubernetes pyyaml >/dev/null 2>&1 && python /app/remediator.py
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: kyverno-remediator-script
            defaultMode: 0o755
