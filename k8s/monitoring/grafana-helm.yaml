apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    phase: "4"
spec:
  chart: grafana
  repo: https://grafana.github.io/helm-charts
  version: 7.0.8
  releaseName: grafana
  targetNamespace: monitoring
  
  values: |
    # Grafana Configuration
    replicas: 1
    
    # Admin Credentials (Change in production!)
    adminUser: admin
    adminPassword: "changeme"
    
    # Service Account
    serviceAccount:
      create: true
      name: grafana
    
    # Resource Limits
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    # Persistence
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 5Gi
    
    # Security Context
    podSecurityContext:
      fsGroup: 472
      runAsUser: 472
      runAsNonRoot: true
    
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
    
    # Service
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    # Data Sources (Prometheus + Loki)
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000

    # Dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
    
    dashboards:
      default:
        kubernetes-cluster:
          url: https://grafana.com/api/dashboards/7249/revisions/1/download
        node-exporter:
          url: https://grafana.com/api/dashboards/1860/revisions/23/download
    
    # Environment Variables
    env:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "changeme"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
      GF_USERS_ALLOW_SIGN_UP: "false"
