apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNoHostPathVolumes
metadata:
  name: no-hostpath-volumes
spec:
  match:
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - cert-manager
      - kubernetes-dashboard
      - local-path-storage
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
