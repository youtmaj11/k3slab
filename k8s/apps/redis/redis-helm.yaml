apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: redis
  namespace: default
  labels:
    app: redis
    phase: "3"
spec:
  chart: redis
  repo: https://charts.bitnami.com/bitnami
  version: 17.21.0
  releaseName: redis
  targetNamespace: default
  
  values: |
    # Redis Configuration
    auth:
      enabled: true
      password: "changeme"
    
    # Master Configuration
    master:
      # Persistence
      persistence:
        enabled: true
        storageClass: longhorn
        size: 5Gi
      
      # Resource Limits
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      
      # Security Context
      podSecurityContext:
        enabled: true
        fsGroup: 1001
      
      containerSecurityContext:
        enabled: true
        runAsUser: 1001
        runAsNonRoot: true
      
      # Service
      service:
        type: ClusterIP
        port: 6379
      
      # Probes
      livenessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      
      readinessProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
    
    # Replica disabled for single-node homelab
    replica:
      enabled: false
    
    # Sentinel disabled for skeleton
    sentinel:
      enabled: false
    
    # Cluster disabled for skeleton
    cluster:
      enabled: false
    
    # Metrics disabled for skeleton
    metrics:
      enabled: false
