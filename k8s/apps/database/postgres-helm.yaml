apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
    phase: "3"
spec:
  chart: postgresql
  repo: https://charts.bitnami.com/bitnami
  version: 13.1.5
  releaseName: postgres
  targetNamespace: default
  
  values: |
    # PostgreSQL Configuration
    global:
      postgresql:
        auth:
          username: postgres
          password: "changeme"
          database: app_db
    
    # Primary Replica Configuration
    primary:
      # Persistence
      persistence:
        enabled: true
        storageClass: longhorn
        size: 10Gi
        existingClaim: postgres-data
      
      # Resource Limits
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 256Mi
      
      # Security Context
      podSecurityContext:
        enabled: true
        fsGroup: 1001
      
      containerSecurityContext:
        enabled: true
        runAsUser: 1001
        runAsNonRoot: true
      
      # Service
      service:
        type: ClusterIP
        port: 5432
      
      # Probes
      livenessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      
      readinessProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
    
    # Metrics & Monitoring placeholders
    metrics:
      enabled: false
    
    # High Availability disabled for single-node homelab
    readReplicas:
      enabled: false
    
    # Backup disabled for skeleton
    backup:
      enabled: false
