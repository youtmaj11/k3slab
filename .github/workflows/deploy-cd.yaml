name: Deploy CD

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - '.github/workflows/deploy-cd.yaml'

jobs:
  notify-argocd:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify ArgoCD of repository update
        run: |
          echo "Kubernetes manifest changes have been pushed to main."
          echo "ArgoCD will automatically reconcile changes for the k8s/ folder."
