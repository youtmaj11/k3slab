---
- name: Install prerequsite packages
  package:
    name: "{{ k3s_dependencies }}"
    state: present
  when: ansible_os_family in ['Debian', 'RedHat']

- name: Ensure k3s binary is installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s if missing
  shell: |
    curl -sfL {{ k3s_install_url }} | \
    INSTALL_K3S_CHANNEL={{ k3s_channel }} \
    INSTALL_K3S_EXEC='{{ k3s_exec_args }}' sh -
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s service is started and enabled
  service:
    name: k3s
    state: started
    enabled: true
  when: k3s_binary.stat.exists
